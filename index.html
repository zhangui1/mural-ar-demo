<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文物壁画 AR 导览 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <h1 id="muralTitle">文物壁画 AR 导览 Demo</h1>
      <p>第一版 Web 原型</p>
    </header>

    <section class="mural-stage" aria-label="壁画展示区域">
      <div id="muralFrame" class="mural-frame">
        <img
          id="muralImage"
          src="assets/murals/mural_001.jpg"
          alt="文物壁画"
          hidden
        >
        <svg
          id="polygonOverlay"
          class="polygon-overlay"
          aria-hidden="true"
        ></svg>
        <div id="focusDimLayer" class="focus-dim-layer" hidden></div>
        <div id="muralMissingMessage" class="mural-placeholder">
          请将壁画图片命名为 mural_001.jpg 或 mural_001.png，并放入 assets/murals/ 目录。
        </div>
        <div id="objectTooltip" class="object-tooltip" hidden></div>
        <article id="infoCard" class="info-card" hidden>
          <p id="infoCardCategory" class="info-card__category"></p>
          <h2 id="infoCardTitle" class="info-card__title"></h2>
          <p id="infoCardSummary" class="info-card__summary"></p>
        </article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
